name: Weekly Codex Rust bug sweep (aggregate)

on:
  issue_comment:
    types: [created]

permissions:
  issues: write

concurrency:
  group: codex-weekly-bug-sweep-aggregate-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  aggregate:
    if: ${{ github.event.issue.number == vars.CODEX_WEEKLY_ISSUE_NUMBER }}
    runs-on: ubuntu-latest
    steps:
      - name: Patch aggregate comment with batch result
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            const incoming = (context.payload.comment.body || "").trim();

            // Ignore request comments (they start with @codex)
            if (incoming.startsWith("@codex")) return;

            // Parse result marker
            const m = incoming.match(/^<!-- CODEX_SWEEP_RESULT week=([^\s]+) batch=([^\s]+) -->/m);
            if (!m) return;

            const weekKey = m[1];
            const batchKey = m[2];

            const issueNumber = context.payload.issue.number;
            const aggMarker = `<!-- CODEX_SWEEP_AGG week=${weekKey} -->`;

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              per_page: 100,
            });

            const agg = comments.find(c => (c.body || "").includes(aggMarker));
            if (!agg) return;

            const begin = `<!-- BEGIN batch=${batchKey} -->`;
            const end   = `<!-- END batch=${batchKey} -->`;

            const escape = (s) => s.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
            const re = new RegExp(`${escape(begin)}[\\s\\S]*?${escape(end)}`, "m");

            if (!re.test(agg.body || "")) return;

            // Strip the result marker line from inserted content
            const inserted = incoming.replace(/^<!-- CODEX_SWEEP_RESULT[^\n]*-->\s*/m, "").trim();

            // Update placeholder
            let newBody = (agg.body || "").replace(re, `${begin}\n\n${inserted}\n\n${end}`);

            // Update progress count
            const total = (newBody.match(/<!-- BEGIN batch=/g) || []).length;
            const pending = (newBody.match(/_\((?:pending)\)_/g) || []).length;
            const completed = Math.max(0, total - pending);

            newBody = newBody.replace(
              /Progress:\s*\*\*\d+\/\d+\*\*/,
              `Progress: **${completed}/${total}**`
            );

            // Safety: avoid GitHub comment size errors (~65k chars is a common failure mode). :contentReference[oaicite:6]{index=6}
            // If too large, replace this batch with a short stub linking to the original comment.
            const MAX_SAFE = 64000;
            if (newBody.length > MAX_SAFE) {
              const url = context.payload.comment.html_url;
              const stub = [
                "**(omitted in aggregate due to size limits)**",
                `Full batch output: ${url}`,
              ].join("\n");
              newBody = (agg.body || "").replace(re, `${begin}\n\n${stub}\n\n${end}`);
              // progress update again
              const t2 = (newBody.match(/<!-- BEGIN batch=/g) || []).length;
              const p2 = (newBody.match(/_\((?:pending)\)_/g) || []).length;
              const c2 = Math.max(0, t2 - p2);
              newBody = newBody.replace(/Progress:\s*\*\*\d+\/\d+\*\*/, `Progress: **${c2}/${t2}**`);
            }

            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: agg.id,
              body: newBody,
            });