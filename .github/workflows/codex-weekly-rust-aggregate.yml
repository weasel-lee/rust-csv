name: Weekly Codex Rust bug sweep collector

on:
  issue_comment:
    types:
      - created

concurrency:
  group: weekly-codex-rust-bug-sweep-collector-${{ github.event.issue.number }}
  cancel-in-progress: false

permissions:
  contents: read
  issues: write

env:
  ISSUE_NUMBER: ${{ vars.CODEX_WEEKLY_ISSUE_NUMBER }}

jobs:
  collect-codex-results:
    runs-on: ubuntu-latest

    steps:
      - name: Collect Codex batch result and update aggregate state
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.AUTHOR_TOKEN }}
          script: |
            const issueNumber = Number(process.env.ISSUE_NUMBER || "0");
            if (!issueNumber) {
              throw new Error("Set repo variable CODEX_WEEKLY_BUG_SWEEP_ISSUE_NUMBER.");
            }

            const currentIssueNumber = context.payload.issue.number;
            if (currentIssueNumber !== issueNumber) {
              core.info(`Ignoring issue #${currentIssueNumber}; target is #${issueNumber}.`);
              return;
            }

            const incomingComment = context.payload.comment;
            const incomingBody = incomingComment.body || "";

            const resultRegex = /<!--\s*CODEX_SWEEP_RESULT\s+week=([0-9]{4}-W[0-9]{2})\s+batch=([^\s>]+)\s*-->/i;
            const match = incomingBody.match(resultRegex);
            if (!match) {
              core.info("No CODEX_SWEEP_RESULT marker found; skipping.");
              return;
            }

            const weekKey = match[1];
            const batchKey = match[2];

            const comments = await github.paginate(
              github.rest.issues.listComments,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: currentIssueNumber,
                per_page: 100,
              }
            );

            const overviewMarker = `<!-- CODEX_SWEEP_AGG week=${weekKey} -->`;
            const finalMarker = `<!-- CODEX_SWEEP_FINAL week=${weekKey} -->`;

            const overviewComment = comments.find(c => (c.body || "").includes(overviewMarker));
            if (!overviewComment) {
              core.warning(`No overview comment found for ${weekKey}; skipping.`);
              return;
            }

            const escapeRegExp = s => s.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");

            const beginMarker = `<!-- BEGIN batch=${batchKey} -->`;
            const endMarker = `<!-- END batch=${batchKey} -->`;

            let overviewBody = overviewComment.body || "";
            if (!overviewBody.includes(beginMarker) || !overviewBody.includes(endMarker)) {
              core.warning(`Batch ${batchKey} does not exist in overview ${weekKey}; skipping.`);
              return;
            }

            const payload = incomingBody.replace(resultRegex, "").trim();
            const normalizedPayload = payload || "_(no findings provided)_";
            const statusLine = `_updated: ${incomingComment.created_at} (source comment id ${incomingComment.id})_`;

            const batchBlockRegex = new RegExp(
              `${escapeRegExp(beginMarker)}[\\s\\S]*?${escapeRegExp(endMarker)}`
            );
            overviewBody = overviewBody.replace(
              batchBlockRegex,
              `${beginMarker}\n${statusLine}\n\n${normalizedPayload}\n${endMarker}`
            );

            const blockRegex = /<!-- BEGIN batch=([^\s>]+) -->([\s\S]*?)<!-- END batch=\1 -->/g;
            const blocks = [...overviewBody.matchAll(blockRegex)];
            const totalBatches = blocks.length;
            const completedBatches = blocks.filter(([, , body]) => body.includes("_updated: ")).length;

            const progressLine = `Progress: **${completedBatches}/${totalBatches}**`;
            if (/Progress:\s*\*\*\d+\/\d+\*\*/.test(overviewBody)) {
              overviewBody = overviewBody.replace(/Progress:\s*\*\*\d+\/\d+\*\*/, progressLine);
            } else {
              overviewBody = `${overviewBody.trimEnd()}\n\n${progressLine}\n`;
            }

            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: overviewComment.id,
              body: overviewBody,
            });

            if (totalBatches === 0 || completedBatches !== totalBatches) {
              core.info(`Progress updated: ${completedBatches}/${totalBatches}.`);
              return;
            }

            const refreshedComments = await github.paginate(
              github.rest.issues.listComments,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: currentIssueNumber,
                per_page: 100,
              }
            );

            const refreshedOverview = refreshedComments.find(c => (c.body || "").includes(overviewMarker));
            if (!refreshedOverview) {
              core.warning("Overview comment disappeared before final aggregation.");
              return;
            }

            const finalBlocks = [...(refreshedOverview.body || "").matchAll(blockRegex)];
            const finalLines = [
              finalMarker,
              `## Weekly Codex Rust bug sweep aggregated result (${weekKey})`,
              "",
              `Source overview comment id: ${refreshedOverview.id}`,
              `Completed batches: **${finalBlocks.length}/${finalBlocks.length}**`,
              "",
              "## Consolidated likely bugs (by batch)",
              "",
            ];

            for (const block of finalBlocks) {
              const batch = block[1];
              const blockBody = (block[2] || "").trim() || "_(no findings provided)_";
              finalLines.push(`### Batch \`${batch}\``);
              finalLines.push("");
              finalLines.push(blockBody);
              finalLines.push("");
            }

            const finalBody = `${finalLines.join("\n").trimEnd()}\n`;
            const existingFinal = refreshedComments.find(c => (c.body || "").includes(finalMarker));

            if (existingFinal) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existingFinal.id,
                body: finalBody,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: currentIssueNumber,
                body: finalBody,
              });
            }

            const taskPrefix = `<!-- CODEX_SWEEP_TASK week=${weekKey} `;
            const resultPrefix = `<!-- CODEX_SWEEP_RESULT week=${weekKey} `;
            const cleanupTargets = refreshedComments.filter(comment => {
              const body = comment.body || "";
              return body.includes(taskPrefix) || body.includes(resultPrefix);
            });

            for (const comment of cleanupTargets) {
              try {
                await github.rest.issues.deleteComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: comment.id,
                });
              } catch (error) {
                core.warning(`Failed to delete comment ${comment.id}: ${error.message}`);
              }
            }

            core.info(
              `Final aggregation complete for ${weekKey}. Cleaned ${cleanupTargets.length} intermediate comments.`
            );
        env:
          ISSUE_NUMBER: ${{ env.ISSUE_NUMBER }}
