name: Weekly Codex Rust bug sweep collector

on:
  issue_comment:
    types:
      - created

concurrency:
  group: weekly-codex-rust-bug-sweep-collector-${{ github.event.issue.number }}
  cancel-in-progress: false

permissions:
  contents: read
  issues: write

env:
  ISSUE_NUMBER: ${{ vars.CODEX_WEEKLY_BUG_SWEEP_ISSUE_NUMBER }}

jobs:
  collect-codex-results:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 1
          ref: ${{ github.sha }}

      - name: Collect Codex batch result and update aggregate state
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.AUTHOR_TOKEN }}
          script: |
            const path = require("path");
            const { run } = require(
              path.join(process.env.GITHUB_WORKSPACE, ".github/bug-sweep/scripts/collect_weekly_codex_bug_sweep_results.js")
            );
            await run({ github, context, core });
        env:
          ISSUE_NUMBER: ${{ env.ISSUE_NUMBER }}
