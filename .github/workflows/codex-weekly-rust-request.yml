name: Weekly Codex Rust bug sweep

on:
  schedule:
    - cron: "0 0 * * 1" # Mondays 00:00 UTC
  workflow_dispatch: {}
  push:
    branches:
      - test_workflow

concurrency:
  group: weekly-codex-rust-bug-sweep
  cancel-in-progress: false

permissions:
  contents: read
  issues: write

env:
  ISSUE_NUMBER: ${{ vars.CODEX_WEEKLY_ISSUE_NUMBER }}
  MAX_FILES_PER_BATCH: ${{ vars.CODEX_MAX_FILES_PER_BATCH }} # optional; defaults to 12 if empty
  MAX_BYTES_PER_BATCH: ${{ vars.CODEX_MAX_BYTES_PER_BATCH }} # optional; defaults to 150000 if empty

jobs:
  trigger-codex:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Compute weekly key
        run: echo "WEEK_KEY=$(date -u +%G-W%V)" >> "$GITHUB_ENV"

      - name: Build @codex issue comment (static prompt + dynamic manifest)
        shell: bash
        run: |
          set -euo pipefail
          python <<'PY'
          import math
          import os
          import subprocess
          from collections import defaultdict
          from pathlib import Path
          import fnmatch

          repo = os.environ["GITHUB_REPOSITORY"]
          week_key = os.environ["WEEK_KEY"]

          max_files = int(os.getenv("MAX_FILES_PER_BATCH") or 12)
          max_bytes = int(os.getenv("MAX_BYTES_PER_BATCH") or 150_000)
          allowlist_path = (".github/metadata/allowlist.txt").strip()

          prompt_path = Path(".github/codex/prompts/weekly-rust-bug-scan.md")
          if not prompt_path.exists():
            raise SystemExit("Missing .github/codex/prompts/weekly-rust-bug-scan.md")
          static_prompt = prompt_path.read_text(encoding="utf-8").strip()

          def git_lines(*args):
            return subprocess.check_output(["git", *args], text=True).splitlines()

          # --- Load allowlist patterns (your include + !exclude format) ---
          allow_file = Path(allowlist_path)
          lines = []
          if allow_file.exists():
            for raw in allow_file.read_text(encoding="utf-8").splitlines():
              s = raw.strip()
              if not s or s.startswith("#"):
                continue
              lines.append(s)

          includes = [x for x in lines if not x.startswith("!")]
          excludes = [x[1:] for x in lines if x.startswith("!")]

          # Handle mismatch: patterns start with "trading/" but repo root doesn't have that folder.
          strip_trading_prefix = False
          if not Path("trading").is_dir() and any(p.startswith("trading/") for p in includes + excludes):
            strip_trading_prefix = True

          def normalize_pat(p: str) -> str:
            if strip_trading_prefix and p.startswith("trading/"):
              return p[len("trading/"):]
            return p

          includes = [normalize_pat(p) for p in includes]
          excludes = [normalize_pat(p) for p in excludes]

          # --- Collect tracked .rs and apply allowlist ---
          tracked = git_lines("ls-files")
          rust = [p for p in tracked if p.endswith(".rs")]

          def allowed(p: str) -> bool:
            if includes and not any(fnmatch.fnmatch(p, pat) for pat in includes):
              return False
            if excludes and any(fnmatch.fnmatch(p, pat) for pat in excludes):
              return False
            return True

          files = []
          for rel in rust:
            if not allowed(rel):
              continue
            fp = Path(rel)
            if fp.is_file():
              files.append((rel, fp.stat().st_size))

          marker = f"<!-- codex-weekly-rust-bug-scan:{week_key} -->"
          out = []
          out.append(marker)
          out.append("@codex Run the weekly Rust bug sweep for this repository.")
          out.append("")
          out.append(f"Repository: `{repo}`")
          out.append("")

          # If nothing matched, still trigger with an acknowledgement.
          if not files:
            out.append(static_prompt)
            out.append("")
            out.append("## Batch manifest")
            out.append("_No Rust files matched the allowlist._")
            Path("codex-comment.md").write_text("\n".join(out) + "\n", encoding="utf-8")
            raise SystemExit(0)

          # --- Find crate roots by Cargo.toml and map file to nearest crate ---
          cargo_tomls = git_lines("ls-files", ":(glob)**/Cargo.toml")
          crate_roots = sorted({str(Path(p).parent) for p in cargo_tomls}, key=len, reverse=True)

          def crate_for(path: str) -> str:
            for root in crate_roots:
              if root == ".":
                return "root"
              if path == root or path.startswith(root + "/"):
                return Path(root).name
            return "unknown"

          by_crate = defaultdict(list)
          for rel, sz in sorted(files, key=lambda x: x[0]):
            by_crate[crate_for(rel)].append((rel, sz))

          # --- Batch pack by bytes (and file-count cap) per crate ---
          batches = []
          for crate in sorted(by_crate.keys()):
            crate_files = by_crate[crate]
            crate_batches = []

            cur = []
            cur_bytes = 0
            idx = 1

            def flush():
              nonlocal cur, cur_bytes, idx
              if not cur:
                return
              crate_batches.append({
                "key": f"{crate}__{idx:02d}",
                "crate": crate,
                "index": idx,
                "files": cur[:],
                "bytes": cur_bytes,
                "oversize": False,
              })
              idx += 1
              cur = []
              cur_bytes = 0

            for rel, sz in crate_files:
              # Explicit oversize handling: keep it in its own single-file batch.
              if sz > max_bytes:
                if cur:
                  flush()
                crate_batches.append({
                  "key": f"{crate}__{idx:02d}",
                  "crate": crate,
                  "index": idx,
                  "files": [(rel, sz)],
                  "bytes": sz,
                  "oversize": True,
                })
                idx += 1
                continue

              if cur and (len(cur) >= max_files or (cur_bytes + sz) > max_bytes):
                flush()

              cur.append((rel, sz))
              cur_bytes += sz

            flush()

            total = len(crate_batches)
            for b in crate_batches:
              b["total"] = total
            batches.extend(crate_batches)

          # --- Compose final comment: static prompt + dynamic manifest ---
          out.append(static_prompt)
          out.append("")
          out.append("## Sweep parameters")
          out.append(f"- Allowlist file: `{allow_file.as_posix() if allow_file.exists() else allowlist_path}`")
          out.append(f"- Rust files in scope: **{len(files)}**")
          out.append(f"- Max files per batch: **{max_files}**")
          out.append(f"- Max bytes per batch: **{max_bytes}** (oversize files are single-file batches)")
          out.append("")
          out.append("## Batch manifest (grouped by crate)")

          for crate in sorted(by_crate.keys()):
            crate_batches = [b for b in batches if b["crate"] == crate]
            for b in crate_batches:
              kib = math.ceil(b["bytes"] / 1024)
              flag = " — OVERSIZE" if b["oversize"] else ""
              out.append(f"<details><summary>Crate `{crate}` — Batch {b['index']:02d}/{b['total']:02d} — {len(b['files'])} files — ~{kib} KiB{flag}</summary>")
              out.append("")
              out.append("```text")
              for rel, sz in b["files"]:
                out.append(f"{rel} ({sz} bytes)")
              out.append("```")
              out.append("")
              out.append("</details>")

          Path("codex-comment.md").write_text("\n".join(out) + "\n", encoding="utf-8")
          PY

      - name: Post weekly @codex comment (JAY_GITHUB_TOKEN)
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.JAY_GITHUB_TOKEN }}
          script: |
            const fs = require("fs");

            const issueNumber = Number(process.env.ISSUE_NUMBER);
            if (!issueNumber) throw new Error("Set repo variable CODEX_WEEKLY_ISSUE_NUMBER.");

            const marker = `<!-- codex-weekly-rust-bug-scan:${process.env.WEEK_KEY} -->`;

            const comments = await github.paginate(
              github.rest.issues.listComments,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                per_page: 100,
              }
            );

            if (comments.some(c => (c.body || "").includes(marker))) {
              console.log(`Trigger comment already exists for ${process.env.WEEK_KEY}.`);
              return;
            }

            const body = fs.readFileSync("codex-comment.md", "utf8");

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body,
            });
        env:
          ISSUE_NUMBER: ${{ env.ISSUE_NUMBER }}
          WEEK_KEY: ${{ env.WEEK_KEY }}