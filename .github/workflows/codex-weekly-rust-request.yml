name: Weekly Codex Rust bug sweep

on:
  schedule:
    - cron: "0 0 * * 1" # Mondays 00:00 UTC
  workflow_dispatch: {}

concurrency:
  group: weekly-codex-rust-bug-sweep
  cancel-in-progress: false

permissions:
  contents: read
  issues: write

env:
  ISSUE_NUMBER: ${{ vars.CODEX_WEEKLY_BUG_SWEEP_ISSUE_NUMBER }}
  MAX_FILES_PER_BATCH: ${{ vars.CODEX_MAX_FILES_PER_BATCH }} # optional; defaults to 15 if empty
  MAX_BYTES_PER_BATCH: ${{ vars.CODEX_MAX_BYTES_PER_BATCH }} # optional; defaults to 150000 if empty

jobs:
  trigger-codex:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Compute weekly key
        run: echo "WEEK_KEY=$(date -u +%G-W%V)" >> "$GITHUB_ENV"

      - name: Build weekly sweep overview/task comments
        shell: bash
        run: |
          set -euo pipefail
          python <<'PY'
          import fnmatch
          import json
          import math
          import os
          import subprocess
          from collections import defaultdict
          from datetime import date, datetime, timezone
          from pathlib import Path

          repo = os.environ["GITHUB_REPOSITORY"]
          week_key = os.environ["WEEK_KEY"]

          max_files = int(os.getenv("MAX_FILES_PER_BATCH") or 15)
          max_bytes = int(os.getenv("MAX_BYTES_PER_BATCH") or 150_000)
          allowlist_path = ".github/metadata/allowlist.txt"

          prompt_path = Path(".github/bug_sweep/rust-bug-sweep.txt")
          if not prompt_path.exists():
            raise SystemExit("Missing .github/bug_sweep/rust-bug-sweep.txt")
          static_prompt = prompt_path.read_text(encoding="utf-8").strip()

          def git_lines(*args):
            return subprocess.check_output(["git", *args], text=True).splitlines()

          # Load allowlist patterns (include + !exclude)
          allow_file = Path(allowlist_path)
          lines = []
          if allow_file.exists():
            for raw in allow_file.read_text(encoding="utf-8").splitlines():
              s = raw.strip()
              if not s or s.startswith("#"):
                continue
              lines.append(s)

          includes = [x for x in lines if not x.startswith("!")]
          excludes = [x[1:] for x in lines if x.startswith("!")]

          tracked = git_lines("ls-files")
          rust = [p for p in tracked if p.endswith(".rs")]

          def allowed(path: str) -> bool:
            if includes and not any(fnmatch.fnmatch(path, pat) for pat in includes):
              return False
            if excludes and any(fnmatch.fnmatch(path, pat) for pat in excludes):
              return False
            return True

          files = []
          for rel in rust:
            if not allowed(rel):
              continue
            fp = Path(rel)
            if fp.is_file():
              files.append((rel, fp.stat().st_size))

          # Find crate roots by Cargo.toml and map file -> nearest crate.
          cargo_tomls = git_lines("ls-files", ":(glob)**/Cargo.toml")
          crate_roots = sorted({str(Path(p).parent) for p in cargo_tomls}, key=len, reverse=True)

          def crate_for(path: str) -> str:
            for root in crate_roots:
              if root == ".":
                return "root"
              if path == root or path.startswith(root + "/"):
                return Path(root).name
            return "unknown"

          by_crate = defaultdict(list)
          for rel, size in sorted(files, key=lambda x: x[0]):
            by_crate[crate_for(rel)].append((rel, size))

          # Batch pack by bytes and file-count cap per crate.
          batches = []
          for crate in sorted(by_crate.keys()):
            crate_files = by_crate[crate]
            crate_batches = []
            cur = []
            cur_bytes = 0
            idx = 1

            def flush(cur_files, cur_total_bytes, batch_idx):
              if not cur_files:
                return cur_files, cur_total_bytes, batch_idx
              crate_batches.append({
                "key": f"{crate}__{batch_idx:02d}",
                "crate": crate,
                "index": batch_idx,
                "files": cur_files[:],
                "bytes": cur_total_bytes,
                "oversize": False,
              })
              return [], 0, batch_idx + 1

            for rel, size in crate_files:
              if size > max_bytes:
                if cur:
                  cur, cur_bytes, idx = flush(cur, cur_bytes, idx)
                crate_batches.append({
                  "key": f"{crate}__{idx:02d}",
                  "crate": crate,
                  "index": idx,
                  "files": [(rel, size)],
                  "bytes": size,
                  "oversize": True,
                })
                idx += 1
                continue

              if cur and (len(cur) >= max_files or (cur_bytes + size) > max_bytes):
                cur, cur_bytes, idx = flush(cur, cur_bytes, idx)

              cur.append((rel, size))
              cur_bytes += size

            cur, cur_bytes, idx = flush(cur, cur_bytes, idx)

            total = len(crate_batches)
            for batch in crate_batches:
              batch["total"] = total
            batches.extend(crate_batches)

          for global_index, batch in enumerate(batches):
            batch["global_index"] = global_index

          # Rotation index i (UTC weeks since Monday 1970-01-05).
          anchor = date(1970, 1, 5)
          today_utc = datetime.now(timezone.utc).date()
          week_index = (today_utc - anchor).days // 7

          if batches:
            raw_indices = [((week_index * 3) + off) % len(batches) for off in range(3)]
            selected_indices = []
            for idx in raw_indices:
              if idx not in selected_indices:
                selected_indices.append(idx)
          else:
            raw_indices = []
            selected_indices = []

          selected_batches = [batches[idx] for idx in selected_indices]

          def fmt_kib(byte_count: int) -> int:
            return math.ceil(byte_count / 1024)

          # Build overview/board comment.
          overview = []
          overview.append(f"<!-- CODEX_SWEEP_AGG week={week_key} -->")
          overview.append(f"## Weekly Codex Rust bug sweep ({week_key})")
          overview.append(f"Progress: **0/{len(selected_batches)}**")
          overview.append("")
          overview.append("This comment is updated in-place as Codex finishes each batch.")
          overview.append("")
          overview.append("### Sweep parameters")
          overview.append(f"- Allowlist: `{allow_file.as_posix() if allow_file.exists() else allowlist_path}`")
          overview.append(f"- Rust files in scope: **{len(files)}**")
          overview.append(f"- Max files per batch: **{max_files}**")
          overview.append(f"- Max bytes per batch: **{max_bytes}** (oversize => single-file batch)")
          overview.append(f"- Total generated batches (`N`): **{len(batches)}**")
          overview.append(f"- Week index (`i`): **{week_index}**")

          if selected_indices:
            idx_line = ", ".join(str(idx) for idx in selected_indices)
            key_line = ", ".join(f"`{batch['key']}`" for batch in selected_batches)
          else:
            idx_line = "(none)"
            key_line = "(none)"

          overview.append(f"- Selected batch indices: {idx_line}")
          overview.append(f"- Selected batch keys: {key_line}")
          overview.append("")

          if not selected_batches:
            if not files:
              overview.append("_No Rust files matched the allowlist._")
            else:
              overview.append("_No batch selected for this week._")
          else:
            selected_by_crate = defaultdict(list)
            crate_order = []
            for batch in selected_batches:
              crate = batch["crate"]
              if crate not in selected_by_crate:
                crate_order.append(crate)
              selected_by_crate[crate].append(batch)

            for crate in crate_order:
              overview.append(f"### Crate: `{crate}`")
              for batch in selected_by_crate[crate]:
                kib = fmt_kib(batch["bytes"])
                oversize = " (OVERSIZE)" if batch["oversize"] else ""
                overview.append(
                  f"#### Batch `{batch['key']}` ({len(batch['files'])} files, ~{kib} KiB{oversize})"
                )
                overview.append(f"<!-- BEGIN batch={batch['key']} -->")
                overview.append("_(pending)_")
                overview.append(f"<!-- END batch={batch['key']} -->")
                overview.append("")

          Path("codex-overview-comment.md").write_text(
            "\n".join(overview).rstrip() + "\n",
            encoding="utf-8",
          )

          # Build 1 comment per selected batch task.
          tasks = []
          for batch in selected_batches:
            task_lines = []
            task_lines.append(f"<!-- CODEX_SWEEP_TASK week={week_key} batch={batch['key']} -->")
            task_lines.append("@codex")
            task_lines.append("")
            task_lines.append("Run the Rust bug sweep for the assigned batch only.")
            task_lines.append("")
            task_lines.append("Reply in a new issue comment.")
            task_lines.append("The first line of your reply must be exactly:")
            task_lines.append(f"`<!-- CODEX_SWEEP_RESULT week={week_key} batch={batch['key']} -->`")
            task_lines.append("")
            task_lines.append(f"Repository: `{repo}`")
            task_lines.append(f"Week: `{week_key}`")
            task_lines.append(f"Assigned batch: `{batch['key']}`")
            task_lines.append(f"Global batch index: `{batch['global_index'] + 1}/{len(batches)}`")
            task_lines.append("")
            task_lines.append(static_prompt)
            task_lines.append("")
            task_lines.append("## Assigned batch manifest")
            kib = fmt_kib(batch["bytes"])
            oversize = " (OVERSIZE)" if batch["oversize"] else ""
            task_lines.append(
              f"Crate `{batch['crate']}` — Batch {batch['index']:02d}/{batch['total']:02d} — "
              f"{len(batch['files'])} files — ~{kib} KiB{oversize}"
            )
            task_lines.append("")
            task_lines.append("```text")
            for rel, size in batch["files"]:
              task_lines.append(f"{rel} ({size} bytes)")
            task_lines.append("```")

            tasks.append({
              "batch_key": batch["key"],
              "body": "\n".join(task_lines).rstrip() + "\n",
            })

          Path("codex-task-comments.json").write_text(
            json.dumps(tasks, ensure_ascii=False, indent=2) + "\n",
            encoding="utf-8",
          )
          PY

      - name: Post weekly sweep comments
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.AUTHOR_TOKEN }}
          script: |
            const fs = require("fs");

            const issueNumber = Number(process.env.ISSUE_NUMBER);
            if (!issueNumber) {
              throw new Error("Set repo variable CODEX_WEEKLY_BUG_SWEEP_ISSUE_NUMBER.");
            }

            const weekKey = process.env.WEEK_KEY;
            const overviewMarker = `<!-- CODEX_SWEEP_AGG week=${weekKey} -->`;
            const normalizeBody = body => (body || "").replace(/^\uFEFF/, "").replace(/\r\n/g, "\n");
            const startsWithMarker = (body, marker) => {
              const normalized = normalizeBody(body);
              return normalized === marker || normalized.startsWith(`${marker}\n`);
            };
            const firstLine = body => normalizeBody(body).split("\n", 1)[0] || "";
            const taskMarkerRegex =
              /^<!--\s*CODEX_SWEEP_TASK\s+week=([0-9]{4}-W[0-9]{2})\s+batch=([^\s>]+)\s*-->$/i;

            const comments = await github.paginate(
              github.rest.issues.listComments,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                per_page: 100,
              }
            );

            const overviewBody = fs.readFileSync("codex-overview-comment.md", "utf8");
            const tasks = JSON.parse(fs.readFileSync("codex-task-comments.json", "utf8"));
            const overviewComment = comments.find(comment => startsWithMarker(comment.body, overviewMarker));
            const existingTaskBatches = new Set(
              comments
                .map(comment => {
                  const match = firstLine(comment.body).match(taskMarkerRegex);
                  if (!match || match[1] !== weekKey) {
                    return null;
                  }
                  return match[2];
                })
                .filter(Boolean)
            );

            if (!overviewComment) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                body: overviewBody,
              });
              core.info(`Created overview comment for ${weekKey}.`);
            } else {
              core.info(`Overview comment already exists for ${weekKey}; checking for missing task comments.`);
            }

            const missingTasks = tasks.filter(task => !existingTaskBatches.has(task.batch_key));

            for (const task of missingTasks) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                body: task.body,
              });
            }

            if (missingTasks.length === 0) {
              core.info(`No missing task comments for ${weekKey}.`);
            } else {
              core.info(`Posted ${missingTasks.length} missing task comment(s) for ${weekKey}.`);
            }
        env:
          ISSUE_NUMBER: ${{ env.ISSUE_NUMBER }}
          WEEK_KEY: ${{ env.WEEK_KEY }}
