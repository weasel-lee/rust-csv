name: Weekly Codex Rust bug sweep

on:
  schedule:
    - cron: "0 0 * * 1" # Mondays 00:00 UTC
  workflow_dispatch: {}
  push:
    branches:
      - test_workflow

concurrency:
  group: weekly-codex-rust-bug-sweep
  cancel-in-progress: false

permissions:
  contents: read
  issues: write

env:
  ISSUE_NUMBER: ${{ vars.CODEX_WEEKLY_ISSUE_NUMBER }}
  MAX_FILES_PER_BATCH: ${{ vars.CODEX_MAX_FILES_PER_BATCH }} # optional; defaults to 15 if empty
  MAX_BYTES_PER_BATCH: ${{ vars.CODEX_MAX_BYTES_PER_BATCH }} # optional; defaults to 150000 if empty

jobs:
  trigger-codex:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Compute weekly key
        run: echo "WEEK_KEY=$(date -u +%G-W%V)" >> "$GITHUB_ENV"

      - name: Build batches.json (allowlist + crate + byte batches)
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .codex

          python <<'PY'
          import json
          import math
          import os
          import subprocess
          from collections import defaultdict
          from pathlib import Path
          import fnmatch

          repo = os.environ["GITHUB_REPOSITORY"]
          week_key = os.environ["WEEK_KEY"]

          max_files = int(os.getenv("MAX_FILES_PER_BATCH") or 15)
          max_bytes = int(os.getenv("MAX_BYTES_PER_BATCH") or 150_000)

          allowlist_path = ".github/metadata/allowlist.txt"
          prompt_path = Path(".github/bug_sweep/rust-bug-sweep.txt")
          if not prompt_path.exists():
            raise SystemExit("Missing .github/bug_sweep/rust-bug-sweep.txt")
          static_prompt = prompt_path.read_text(encoding="utf-8").strip()

          def git_lines(*args):
            return subprocess.check_output(["git", *args], text=True).splitlines()

          # allowlist parsing
          allow_file = Path(allowlist_path)
          lines = []
          if allow_file.exists():
            for raw in allow_file.read_text(encoding="utf-8").splitlines():
              s = raw.strip()
              if not s or s.startswith("#"):
                continue
              lines.append(s)

          includes = [x for x in lines if not x.startswith("!")]
          excludes = [x[1:] for x in lines if x.startswith("!")]

          def allowed(p: str) -> bool:
            if includes and not any(fnmatch.fnmatch(p, pat) for pat in includes):
              return False
            if excludes and any(fnmatch.fnmatch(p, pat) for pat in excludes):
              return False
            return True

          tracked = git_lines("ls-files")
          rust = [p for p in tracked if p.endswith(".rs")]

          files = []
          for rel in rust:
            if not allowed(rel):
              continue
            fp = Path(rel)
            if fp.is_file():
              files.append((rel, fp.stat().st_size))

          # crate mapping
          cargo_tomls = git_lines("ls-files", ":(glob)**/Cargo.toml")
          crate_roots = sorted({str(Path(p).parent) for p in cargo_tomls}, key=len, reverse=True)

          def crate_for(path: str) -> str:
            for root in crate_roots:
              if root == ".":
                return "root"
              if path == root or path.startswith(root + "/"):
                return Path(root).name
            return "unknown"

          by_crate = defaultdict(list)
          for rel, sz in sorted(files, key=lambda x: x[0]):
            by_crate[crate_for(rel)].append((rel, sz))

          batches = []
          for crate in sorted(by_crate.keys()):
            crate_files = by_crate[crate]
            crate_batches = []

            cur = []
            cur_bytes = 0
            idx = 1

            def flush():
              nonlocal cur, cur_bytes, idx
              if not cur:
                return
              crate_batches.append({
                "key": f"{crate}__{idx:02d}",
                "crate": crate,
                "index": idx,
                "files": cur[:],
                "bytes": cur_bytes,
                "oversize": False,
              })
              idx += 1
              cur = []
              cur_bytes = 0

            for rel, sz in crate_files:
              # oversize: keep as single-file batch
              if sz > max_bytes:
                if cur:
                  flush()
                crate_batches.append({
                  "key": f"{crate}__{idx:02d}",
                  "crate": crate,
                  "index": idx,
                  "files": [(rel, sz)],
                  "bytes": sz,
                  "oversize": True,
                })
                idx += 1
                continue

              if cur and (len(cur) >= max_files or (cur_bytes + sz) > max_bytes):
                flush()

              cur.append((rel, sz))
              cur_bytes += sz

            flush()

            total = len(crate_batches)
            for b in crate_batches:
              b["total"] = total
            batches.extend(crate_batches)

          out = {
            "repo": repo,
            "week_key": week_key,
            "allowlist_path": allowlist_path,
            "max_files": max_files,
            "max_bytes": max_bytes,
            "rust_files_total": len(files),
            "batches_total": len(batches),
            "batches": batches,
          }

          Path(".codex/batches.json").write_text(json.dumps(out, indent=2), encoding="utf-8")
          Path(".codex/static_prompt.txt").write_text(static_prompt + "\n", encoding="utf-8")
          PY

      - name: Create or refresh aggregate comment (single “collector” comment)
        uses: actions/github-script@v7
        env:
          ISSUE_NUMBER: ${{ env.ISSUE_NUMBER }}
          WEEK_KEY: ${{ env.WEEK_KEY }}
        with:
          github-token: ${{ github.token }}
          script: |
            const fs = require("fs");

            const issueNumber = Number(process.env.ISSUE_NUMBER);
            if (!issueNumber) throw new Error("Set CODEX_WEEKLY_BUG_SWEEP_ISSUE_NUMBER.");

            const data = JSON.parse(fs.readFileSync(".codex/batches.json", "utf8"));
            const weekKey = data.week_key;
            const marker = `<!-- CODEX_SWEEP_AGG week=${weekKey} -->`;

            const batches = data.batches || [];
            const total = batches.length;

            // group by crate
            const byCrate = new Map();
            for (const b of batches) {
              if (!byCrate.has(b.crate)) byCrate.set(b.crate, []);
              byCrate.get(b.crate).push(b);
            }
            for (const [k, v] of byCrate.entries()) v.sort((a,b) => a.index - b.index);

            const bodyLines = [];
            bodyLines.push(marker);
            bodyLines.push(`## Weekly Codex Rust bug sweep (${weekKey})`);
            bodyLines.push(`Progress: **0/${total}**`);
            bodyLines.push("");
            bodyLines.push("This comment is updated in-place as Codex finishes each batch.");
            bodyLines.push("");
            bodyLines.push("### Sweep parameters");
            bodyLines.push(`- Allowlist: \`${data.allowlist_path}\``);
            bodyLines.push(`- Rust files in scope: **${data.rust_files_total}**`);
            bodyLines.push(`- Max files per batch: **${data.max_files}**`);
            bodyLines.push(`- Max bytes per batch: **${data.max_bytes}** (oversize => single-file batch)`);
            bodyLines.push("");

            if (total === 0) {
              bodyLines.push("_No Rust files matched the allowlist._");
            } else {
              for (const crate of Array.from(byCrate.keys()).sort()) {
                bodyLines.push(`### Crate: \`${crate}\``);
                for (const b of byCrate.get(crate)) {
                  const kib = Math.ceil((b.bytes || 0) / 1024);
                  const flag = b.oversize ? " — OVERSIZE" : "";
                  bodyLines.push(`#### Batch \`${b.key}\` (${b.files.length} files, ~${kib} KiB${flag})`);
                  bodyLines.push(`<!-- BEGIN batch=${b.key} -->`);
                  bodyLines.push("_(pending)_");
                  bodyLines.push(`<!-- END batch=${b.key} -->`);
                  bodyLines.push("");
                }
              }
            }

            const body = bodyLines.join("\n");

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              per_page: 100,
            });

            const existing = comments.find(c => (c.body || "").includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                body,
              });
            }

      - name: Post @codex batch request comments (one per batch)
        uses: actions/github-script@v7
        env:
          ISSUE_NUMBER: ${{ env.ISSUE_NUMBER }}
        with:
          github-token: ${{ secrets.AUTHOR_TOKEN }}
          script: |
            const fs = require("fs");

            const issueNumber = Number(process.env.ISSUE_NUMBER);
            if (!issueNumber) throw new Error("Set CODEX_WEEKLY_BUG_SWEEP_ISSUE_NUMBER.");

            const data = JSON.parse(fs.readFileSync(".codex/batches.json", "utf8"));
            const staticPrompt = fs.readFileSync(".codex/static_prompt.txt", "utf8").trim();

            const weekKey = data.week_key;
            const batches = data.batches || [];
            if (batches.length === 0) return;

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              per_page: 100,
            });

            const bodies = comments.map(c => c.body || "");
            const hasMarker = (m) => bodies.some(b => b.includes(m));

            for (const b of batches) {
              const reqMarker = `<!-- CODEX_SWEEP_REQUEST week=${weekKey} batch=${b.key} -->`;
              if (hasMarker(reqMarker)) continue;

              const resultMarker = `<!-- CODEX_SWEEP_RESULT week=${weekKey} batch=${b.key} -->`;

              // Keep responses concise so the aggregate comment doesn't exceed GitHub limits.
              // (GitHub API commonly errors around 65k chars per comment.) :contentReference[oaicite:5]{index=5}
              const body = [
                "@codex",
                reqMarker,
                "",
                `Weekly Rust bug sweep — week: \`${weekKey}\``,
                `Crate: \`${b.crate}\` | Batch: ${b.index}/${b.total} | Key: \`${b.key}\``,
                "",
                "Reply requirements:",
                `1) First line must be exactly: ${resultMarker}`,
                "2) Do NOT include `@codex` in your reply.",
                "3) Keep your reply concise (target <= ~6,000 characters). If more, include top findings and say “truncated; see full analysis in this comment thread.”",
                "",
                "---",
                "",
                staticPrompt,
                "",
                "## Batch manifest",
                ...b.files.map(([p, sz]) => `- \`${p}\` (${sz} bytes)`),
              ].join("\n");

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                body,
              });
            }